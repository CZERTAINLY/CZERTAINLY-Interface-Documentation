                $ref: "#/components/schemas/ErrorMessageDto"
        "503":
          description: Connector Communication Error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorMessageDto"
      security:
      - BearerJWTAuth: []
      - CertificateAuth: []
      - SessionAuth: []
    patch:
      tags:
      - Secret Management
      summary: Update Secret Objects
      operationId: updateSecretObjects
      parameters:
      - name: uuid
        in: path
        description: Secret UUID
        required: true
