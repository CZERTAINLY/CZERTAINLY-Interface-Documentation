          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretUpdateObjectsDto"
        required: true
      responses:
        "204":
          description: Secret objects updated
        "400":
          description: Bad Request
          content:
            '*/*':
